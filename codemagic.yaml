workflows:
  ios-build:
    name: NILIN iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "com.nilin.app"
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-build:
    name: NILIN Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
      - name: Build APK
        script: |
          cd frontend/android
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
