workflows:
  ios-build:
    name: NILIN iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install
      - name: Build unsigned
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO"
    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  android-build:
    name: NILIN Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web assets
        script: |
          cd frontend
          npm run build
      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync android
      - name: Build APK
        script: |
          cd frontend/android
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk
